name: Python tests

on: [push, pull_request]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  python-tests:
    # Shared pipeline lives in https://github.com/SDET-org/common-pipeline
    uses: SDET-org/common-pipeline/.github/workflows/tests-common-python.yml@main
    # Pass all repo/org secrets (TELEGRAM_BOT_*) to the reusable workflow.
    secrets: inherit
